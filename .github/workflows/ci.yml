# .github/workflows/ci.yml
# Pipeline CI para CRM Antigravity
# Executa a cada push e pull request:
#   1. Testes backend (pytest) com banco SQLite mockado
#   2. Validação do TypeScript frontend (tsc --noEmit)

name: CI — Tests & Lint

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend Tests ──────────────────────────────────────
  backend-tests:
    name: "🐍 Backend — Pytest"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar testes
        run: |
          python -m pytest tests/test_all_endpoints.py -v --tb=short --strict-markers -x
        env:
          PYTHONDONTWRITEBYTECODE: "1"

  # ─── Frontend TypeScript Check ──────────────────────────
  frontend-lint:
    name: "📦 Frontend — TypeScript Check"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências Node
        run: npm ci

      - name: Verificar TypeScript (tsc --noEmit)
        run: npx tsc --noEmit
